<!DOCTYPE html>
<html>

<head>
    <title>For Brindha ❤️</title>

    <style>

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Sky Blue Background */
            background-color: #87CEEB;
        }

        /* FAST MOVING CLOUDS */

        .cloud {
            position: absolute;
            color: rgba(255, 255, 255, 0.9);
            animation: moveClouds linear infinite;
        }

        .cloud1 {
            top: 10%;
            left: -20%;
            font-size: 90px;
            animation-duration: 12s;
        }

        .cloud2 {
            top: 30%;
            left: -30%;
            font-size: 110px;
            animation-duration: 16s;
        }

        .cloud3 {
            top: 60%;
            left: -25%;
            font-size: 80px;
            animation-duration: 14s;
        }

        @keyframes moveClouds {

            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(140vw);
            }
        }

        /* FLOATING HEARTS */

        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.35);
            font-size: 25px;
            animation: float 12s linear infinite;
        }

        .heart:nth-child(4) {
            left: 10%;
            animation-duration: 8s;
        }

        .heart:nth-child(5) {
            left: 25%;
            animation-duration: 11s;
            font-size: 30px;
        }

        .heart:nth-child(6) {
            left: 45%;
            animation-duration: 9s;
        }

        .heart:nth-child(7) {
            left: 65%;
            animation-duration: 13s;
            font-size: 28px;
        }

        .heart:nth-child(8) {
            left: 85%;
            animation-duration: 10s;
        }

        @keyframes float {

            0% {
                transform: translateY(100vh);
                opacity: 0;
            }

            30% {
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh);
                opacity: 0;
            }
        }

        /* LOVE TEXT */

        h1 {
            position: relative;
            z-index: 2;

            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            line-height: 1.8;

            padding: 20px;

            font-size: 20px;
            font-weight: 500;

            animation: glowText 2s infinite alternate;
        }

        @keyframes glowText {

            0% {
                color: #001f54;
                text-shadow:
                    0 0 5px #4d79ff;
            }

            50% {
                color: #002b80;
                text-shadow:
                    0 0 10px #5c85ff;
            }

            100% {
                color: #003399;
                text-shadow:
                    0 0 10px #80aaff;
            }
        }

    </style>
</head>

<body>

    <!-- FAST MOVING CLOUDS -->

    <div class="cloud cloud1">☁️</div>
    <div class="cloud cloud2">☁️</div>
    <div class="cloud cloud3">☁️</div>

    <!-- FLOATING HEARTS -->

    <div class="heart">❤️</div>
    <div class="heart">💖</div>
    <div class="heart">💕</div>
    <div class="heart">💞</div>
    <div class="heart">❤️</div>

    <!-- LOVE MESSAGE -->

    <h1>

        ❤️ Forever starts with you, Brindha ❤️
        <br><br>

        💖 You are not just my love,
        <br>

        you are my peace, my happiness,
        <br>

        and my favorite person in this world. 💖
        <br><br>

        💞 Trust me always.
        <br>

        I will stand beside you in every moment. ❤️

    </h1>

</body>

</html>
