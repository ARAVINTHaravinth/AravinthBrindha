<!DOCTYPE html>
<html>

<head>
    <title>For Brindha ❤️</title>

    <style>

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;

            /* NIGHT SKY BACKGROUND */
            background: linear-gradient(to bottom,
                    #1f2735 0%,
                    #3a3d52 45%,
                    #7a5d52 75%,
                    #d08b63 100%);
        }

        /* REALISTIC SMALL MOON */

        .moon {
            position: absolute;

            top: 90px;
            left: 150px;

            width: 18px;
            height: 18px;

            border-radius: 50%;

            background: #fffdf5;

            box-shadow:
                0 0 6px #fffdf5,
                0 0 12px #fff4c2;
        }

        .moon::after {
            content: "";

            position: absolute;

            top: -1px;
            left: 5px;

            width: 18px;
            height: 18px;

            border-radius: 50%;

            background: #2b3140;
        }

        /* SMALL STAR */

        .star {
            position: absolute;

            top: 110px;
            right: 110px;

            width: 3px;
            height: 3px;

            background: white;

            border-radius: 50%;

            box-shadow:
                0 0 5px white,
                0 0 10px white;
        }

        /* MOVING CLOUDS */

        .cloud {
            position: absolute;
            color: rgba(0, 0, 0, 0.35);

            animation: moveClouds linear infinite;
        }

        .cloud1 {
            bottom: 120px;
            left: -30%;
            font-size: 160px;
            animation-duration: 28s;
        }

        .cloud2 {
            bottom: 60px;
            left: -40%;
            font-size: 190px;
            animation-duration: 35s;
        }

        .cloud3 {
            bottom: 170px;
            left: -25%;
            font-size: 120px;
            animation-duration: 30s;
        }

        @keyframes moveClouds {

            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(150vw);
            }
        }

        /* FLOATING HEARTS */

        .heart {
            position: absolute;

            color: rgba(255, 192, 203, 0.25);

            font-size: 22px;

            animation: float 14s linear infinite;
        }

        .heart:nth-child(6) {
            left: 10%;
            animation-duration: 10s;
        }

        .heart:nth-child(7) {
            left: 28%;
            animation-duration: 14s;
        }

        .heart:nth-child(8) {
            left: 50%;
            animation-duration: 12s;
        }

        .heart:nth-child(9) {
            left: 72%;
            animation-duration: 16s;
        }

        .heart:nth-child(10) {
            left: 88%;
            animation-duration: 11s;
        }

        @keyframes float {

            0% {
                transform: translateY(100vh);
                opacity: 0;
            }

            25% {
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh);
                opacity: 0;
            }
        }

        /* LOVE TEXT */

        h1 {
            position: relative;
            z-index: 5;

            font-family: 'Segoe UI', sans-serif;

            text-align: center;

            line-height: 1.8;

            padding: 20px;

            font-size: 20px;

            font-weight: 500;

            animation: glowText 2.5s infinite alternate;
        }

        @keyframes glowText {

            0% {
                color: #d9e6ff;

                text-shadow:
                    0 0 5px rgba(255,255,255,0.3);
            }

            100% {
                color: #ffffff;

                text-shadow:
                    0 0 10px rgba(255,255,255,0.7);
            }
        }

        /* SIGNATURE */

        .signature {
            position: absolute;

            right: 20px;
            bottom: 15px;

            color: rgba(255, 255, 255, 0.8);

            font-size: 14px;

            font-family: 'Segoe UI', sans-serif;
        }

    </style>
</head>

<body>

    <!-- REALISTIC MOON -->

    <div class="moon"></div>

    <!-- STAR -->

    <div class="star"></div>

    <!-- MOVING CLOUDS -->

    <div class="cloud cloud1">☁️</div>
    <div class="cloud cloud2">☁️</div>
    <div class="cloud cloud3">☁️</div>

    <!-- FLOATING HEARTS -->

    <div class="heart">❤️</div>
    <div class="heart">💖</div>
    <div class="heart">💕</div>
    <div class="heart">💞</div>
    <div class="heart">❤️</div>

    <!-- LOVE MESSAGE -->

    <h1>

        ❤️ Forever starts with you, Brindha ❤️
        <br><br>

        💖 You are not just my love,
        <br>

        you are my peace, my happiness,
        <br>

        and my favorite person in this world. 💖
        <br><br>

        💞 Trust me always.
        <br>

        I will stand beside you in every moment. ❤️

    </h1>

    <!-- SIGNATURE -->

    <div class="signature">
        — By Aravinth ❤️
    </div>

</body>

</html>
