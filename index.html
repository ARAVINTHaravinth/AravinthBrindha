<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Brindha ❤️</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
            background: black;
        }

        /* BACKGROUND IMAGES */

        .bg {
            position: absolute;
            inset: 0;

            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;

            background-color: black;

            animation: fade 18s infinite;

            z-index: 1;
        }

        .bg1 {
            background-image:
                linear-gradient(rgba(0,0,0,0.35),
                rgba(0,0,0,0.35)),
                url("photo1.jpg.jpeg");

            animation-delay: 0s;
        }

        .bg2 {
            background-image:
                linear-gradient(rgba(0,0,0,0.35),
                rgba(0,0,0,0.35)),
                url("photo2.jpg.jpg");

            animation-delay: 6s;
        }

        .bg3 {
            background-image:
                linear-gradient(rgba(0,0,0,0.40),
                rgba(0,0,0,0.40)),
                url("photo3.jpg.jpg");

            animation-delay: 12s;
        }

        @keyframes fade {

            0% {
                opacity: 0;
            }

            8% {
                opacity: 1;
            }

            30% {
                opacity: 1;
            }

            38% {
                opacity: 0;
            }

            100% {
                opacity: 0;
            }
        }

        /* MOON */

        .moon {
            position: absolute;
            top: 90px;
            left: 150px;

            width: 18px;
            height: 18px;

            border-radius: 50%;

            background: #fffdf5;

            box-shadow:
                0 0 6px #fffdf5,
                0 0 12px #fff4c2;

            z-index: 3;
        }

        .moon::after {
            content: "";
            position: absolute;

            top: -1px;
            left: 5px;

            width: 18px;
            height: 18px;

            border-radius: 50%;

            background: rgba(0,0,0,0.45);
        }

        /* STAR */

        .star {
            position: absolute;

            top: 110px;
            right: 110px;

            width: 3px;
            height: 3px;

            background: white;

            border-radius: 50%;

            box-shadow:
                0 0 5px white,
                0 0 10px white;

            z-index: 3;
        }

        /* CLOUDS */

        .cloud {
            position: absolute;
            color: rgba(255,255,255,0.15);

            animation: moveClouds linear infinite;

            z-index: 3;
        }

        .cloud1 {
            bottom: 120px;
            left: -30%;
            font-size: 160px;
            animation-duration: 28s;
        }

        .cloud2 {
            bottom: 60px;
            left: -40%;
            font-size: 190px;
            animation-duration: 35s;
        }

        .cloud3 {
            bottom: 170px;
            left: -25%;
            font-size: 120px;
            animation-duration: 30s;
        }

        @keyframes moveClouds {

            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(150vw);
            }
        }

        /* HEARTS */

        .heart {
            position: absolute;

            color: rgba(255, 192, 203, 0.30);

            font-size: 22px;

            animation: float 14s linear infinite;

            z-index: 3;
        }

        .heart:nth-child(8) {
            left: 10%;
            animation-duration: 10s;
        }

        .heart:nth-child(9) {
            left: 28%;
            animation-duration: 14s;
        }

        .heart:nth-child(10) {
            left: 50%;
            animation-duration: 12s;
        }

        .heart:nth-child(11) {
            left: 72%;
            animation-duration: 16s;
        }

        .heart:nth-child(12) {
            left: 88%;
            animation-duration: 11s;
        }

        @keyframes float {

            0% {
                transform: translateY(100vh);
                opacity: 0;
            }

            25% {
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh);
                opacity: 0;
            }
        }

        /* LOVE TEXT */

        h1 {
            position: relative;
            z-index: 5;

            text-align: center;

            line-height: 1.8;

            padding: 20px;

            font-size: 20px;

            font-weight: 500;

            color: white;

            animation: glowText 2.5s infinite alternate;

            text-shadow:
                0 0 10px rgba(0,0,0,0.9),
                0 0 20px rgba(0,0,0,0.7);
        }

        @keyframes glowText {

            0% {
                color: #d9e6ff;
            }

            100% {
                color: #ffffff;
            }
        }

        /* SIGNATURE */

        .signature {
            position: absolute;

            right: 20px;
            bottom: 15px;

            color: rgba(255,255,255,0.9);

            font-size: 14px;

            z-index: 5;

            text-shadow:
                0 0 10px rgba(0,0,0,0.8);
        }

        /* MOBILE */

        @media(max-width: 600px) {

            h1 {
                font-size: 18px;
                padding: 15px;
            }

            .moon {
                top: 50px;
                left: 40px;
            }

            .star {
                right: 40px;
            }
        }

    </style>
</head>

<body>

    <!-- BACKGROUND IMAGES -->

    <div class="bg bg1"></div>
    <div class="bg bg2"></div>
    <div class="bg bg3"></div>

    <!-- MOON -->

    <div class="moon"></div>

    <!-- STAR -->

    <div class="star"></div>

    <!-- CLOUDS -->

    <div class="cloud cloud1">☁️</div>
    <div class="cloud cloud2">☁️</div>
    <div class="cloud cloud3">☁️</div>

    <!-- HEARTS -->

    <div class="heart">❤️</div>
    <div class="heart">💖</div>
    <div class="heart">💕</div>
    <div class="heart">💞</div>
    <div class="heart">❤️</div>

    <!-- MESSAGE -->

    <h1>

        ❤️ Forever starts with you, Brindha ❤️
        <br><br>

        💖 You are not just my love,
        <br>

        you are my peace, my happiness,
        <br>

        and my favorite person in this world. 💖
        <br><br>

        💞 Trust me always.
        <br>

        I will stand beside you in every moment. ❤️

    </h1>

    <!-- SIGNATURE -->

    <div class="signature">
        — By Aravinth ❤️
    </div>

</body>

</html>
